name: CI/CD Pipeline - Spring Angular MySQL

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code source
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Se connecter à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Builder l'image backend Spring Boot
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./springboot/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/springboot-backend:latest

      # 4. Builder l'image frontend Angular
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./angular-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/angular-frontend:latest

      # 5. Lancer l'application complète
      - name: Start application with Docker Compose
        run: docker-compose up -d

      # 6. Attendre que les services démarrent
      - name: Wait for services
        run: sleep 20

      # 7. Vérifier les conteneurs
      - name: Check running containers
        run: docker ps

      # 8. Afficher les logs
      - name: Show logs
        run: docker-compose logs