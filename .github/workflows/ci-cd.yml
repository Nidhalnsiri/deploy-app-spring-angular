name: CI/CD Pipeline - Spring Angular MySQL

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code source
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Installer Java pour compiler le backend
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # 3. Compiler le backend Spring Boot (génère le .jar)
      - name: Build Spring Boot JAR
        run: mvn clean package -DskipTests
        working-directory: ./springboot/app

      # 4. Se connecter à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Builder et pusher l'image backend
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./springboot/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/springboot-backend:latest

      # 6. Builder et pusher l'image frontend
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./angular-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/angular-frontend:latest

      # 7. Lancer l'application complète
      - name: Start application with Docker Compose
        run: docker-compose up -d

      # 8. Attendre que les services démarrent
      - name: Wait for services
        run: sleep 20

      # 9. Vérifier les conteneurs
      - name: Check running containers
        run: docker ps

      # 10. Afficher les logs
      - name: Show logs
        run: docker-compose logs
